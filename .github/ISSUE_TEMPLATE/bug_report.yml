name: Bug Report
description: Report a bug in temporal-kit
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code example or steps that reproduce the issue.
      placeholder: |
        ```ts
        import { ... } from "temporal-kit";
        // ...
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages/stack traces if any.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: temporal-kit version
      placeholder: e.g. 0.2.4
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 24.0.0
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other relevant information (environment, runtime, etc.).
    validations:
      required: false
